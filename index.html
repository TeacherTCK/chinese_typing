<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文輸入法練習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #f0f4f8;
        }
        .text-display {
            line-height: 2.2;
            letter-spacing: 0.25em;
            user-select: none;
        }
        .char-correct { color: #10b981; }
        .char-incorrect { color: #ef4444; background-color: #fee2e2; }
        .char-current { border-bottom: 3px solid #3b82f6; }
        #screenshot-area {
            background: white;
            border-radius: 1rem;
        }
        .category-tag {
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 999px;
            margin-bottom: 8px;
            display: inline-block;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 登入與認證畫面 -->
    <div id="login-screen" class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl p-8 border border-gray-100">
        <div class="text-center mb-8">
			<center><img src="https://yotcwsf.edu.hk/download/Resource/BGImage/schoolLogo005.png"></center>
            <h1 class="text-2xl font-bold text-gray-800">普通電腦科</h1>
			<h1 class="text-2x1 font-bold text-gray-800">中文輸入法練習</h1>
            <p class="text-gray-500 text-sm mt-1">請選擇班別及姓名以開始練習</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">1. 選擇班別</label>
                <select id="login-class" class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="">-- 請選擇班別 --</option>
                    <option value="1A">1A</option>
                    <option value="1B">1B</option>
                    <option value="1C">1C</option>
                    <option value="1D">1D</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">2. 選擇姓名 (班號)</label>
                <select id="login-student" class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none" disabled>
                    <option value="">-- 請先選擇班別 --</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">3. 輸入學生編號 (認證)</label>
                <input type="password" id="login-id" placeholder="請輸入學生編號 (如: a25...)" 
                    class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <button id="btn-login" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-all shadow-lg transform active:scale-95">
                進入練習
            </button>
            <p id="login-error" class="text-red-500 text-center text-sm font-bold hidden">❌ 驗證失敗：編號不正確</p>
        </div>
    </div>

    <!-- 遊戲主畫面 (初始隱藏) -->
    <div id="game-screen" class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 hidden">
        <div class="bg-indigo-700 p-4 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">中文輸入法練習</h1>
                <p id="user-display" class="text-xs opacity-80">學生：未登入</p>
            </div>
            <button onclick="location.reload()" class="text-xs bg-indigo-600 px-3 py-1 rounded hover:bg-indigo-500">登出</button>
        </div>

        <!-- 練習設定與統計 -->
        <div class="p-4 bg-gray-50 border-b">
            <label class="text-xs font-bold text-gray-500 uppercase">練習類別</label>
            <select id="article-select" class="w-full p-2 rounded border border-gray-300 text-sm outline-none bg-white"></select>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-2 p-4 bg-indigo-50 border-b border-indigo-100 text-xs font-bold">
            <div class="flex flex-col items-center p-2 bg-white rounded shadow-sm">
                <span class="text-gray-400">總字數</span>
                <span id="stats-total" class="text-indigo-600 text-lg">0</span>
            </div>
            <div class="flex flex-col items-center p-2 bg-white rounded shadow-sm">
                <span class="text-gray-400">正確數</span>
                <span id="stats-correct" class="text-green-600 text-lg">0</span>
            </div>
            <div class="flex flex-col items-center p-2 bg-white rounded shadow-sm">
                <span class="text-gray-400">正確率</span>
                <span id="stats-accuracy" class="text-orange-600 text-lg">0%</span>
            </div>
            <div class="flex flex-col items-center p-2 bg-white rounded shadow-sm">
                <span class="text-gray-400">耗時</span>
                <span id="stats-time" class="text-blue-600 text-lg">0s</span>
            </div>
            <div class="flex flex-col items-center p-2 bg-white rounded shadow-sm">
                <span class="text-gray-400">速率(CPM)</span>
                <span id="stats-wpm" class="text-purple-600 text-lg">0</span>
            </div>
        </div>

        <div class="p-6">
            <div id="category-display" class="category-tag bg-indigo-600 text-white font-bold">類別</div>
            <div id="text-container" class="text-display text-2xl mb-6 p-6 bg-white rounded-xl border border-gray-200 min-h-[160px] font-medium text-gray-800 shadow-sm"></div>
            <textarea id="input-box" class="w-full p-4 text-xl border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none disabled:bg-gray-100 h-36 resize-none shadow-inner" placeholder="請點擊開始練習..." disabled></textarea>
            <div class="mt-6 flex justify-center gap-4">
                <button id="btn-start" class="px-12 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-full shadow-lg transform active:scale-95">開始練習</button>
                <button id="btn-stop" class="px-12 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-full shadow-lg hidden">結束結算</button>
            </div>
        </div>

        <!-- 結算報告 -->
        <div id="result-overlay" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4 z-50 backdrop-blur-md">
            <div id="screenshot-area" class="bg-white p-8 rounded-3xl max-w-md w-full text-center shadow-2xl border-4 border-indigo-200">
                <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-2"><span class="text-3xl">🏅</span></div>
                <h2 class="text-xl font-black text-indigo-900">中文輸入法練習成果</h2>
                <div id="result-user-info" class="my-4 p-3 bg-gray-50 rounded-xl border border-gray-200 text-sm"></div>
                <div id="result-content" class="text-left space-y-3 mb-6 p-4 bg-indigo-50 rounded-xl border border-indigo-100"></div>
                <div class="space-y-3">
                    <button id="btn-screenshot" class="w-full py-4 bg-orange-500 text-white font-bold rounded-xl hover:bg-orange-600 shadow-lg flex items-center justify-center gap-2">儲存成績單圖片</button>
                    <button onclick="resetGame()" class="w-full py-3 bg-gray-200 text-gray-700 font-bold rounded-xl">再練一次</button>
                </div>
            </div>
        </div>
    </div>

            const map = {'k':'a', 'a':'0', 'b':'1', 'c':'2', 'd':'3', 'e':'4', 'f':'5', 'g':'6', 'h':'7', 'i':'8', 'j':'9'};
            return encoded.split('').map(char => map[char] || char).join('');
        }

        const articleDatabase = [
            { category: "練習 (初級)", items: [{ title: "1. 哲理類 (日、月、金、木、水、火、土)", content: "日曰晶月明朋金鑫鈤鈅木杳采水沐淋滑淦沝火炎焱肖杰土肚釷杜灶圭晴題閑最照旺" },
            { title: "2. 筆劃類 (竹、戈、十、大、中、一、弓)", content: "竹戈十大中一弓鬼麼廣士庫大爻丈天史吏笁士左丁夕宆又引犬太夭在串二三" }] }
        ];

        let currentUser = null;
        let isPlaying = false;
        let startTime = 0;
        let timer = null;
        let currentText = "";

        // UI 初始化
        const classSelect = document.getElementById('login-class');
        const studentSelect = document.getElementById('login-student');
        const idInput = document.getElementById('login-id');
        const loginBtn = document.getElementById('btn-login');

        // 當班別改變時，更新學生清單
        classSelect.addEventListener('change', () => {
            const selectedClass = classSelect.value;
            studentSelect.innerHTML = '<option value="">-- 選擇姓名 (班號) --</option>';
            
            if (!selectedClass) {
                studentSelect.disabled = true;
                return;
            }

            const filtered = rawStudentData.filter(s => s.c === selectedClass);
            // 按班號排序
            filtered.sort((a, b) => parseInt(a.n) - parseInt(b.n));

            filtered.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id; // 這裡綁定的是加密字串
                opt.textContent = `${s.n} 號 - ${s.name}`;
                studentSelect.appendChild(opt);
            });
            studentSelect.disabled = false;
        });

        // 登入驗證
        loginBtn.addEventListener('click', () => {
            const selectedId = studentSelect.value;
            const inputId = idInput.value.trim().toLowerCase();

            if (!selectedId || !inputId) {
                alert("請完整選擇資訊並輸入學生編號");
                return;
            }

            // 尋找選中的學生
            const student = rawStudentData.find(s => s.id === selectedId);

            // 驗證機制：將選中的學生的加密編號解密，然後比對使用者的輸入
            if (student && inputId === decodeId(student.id)) {
                currentUser = student;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                document.getElementById('user-display').textContent = `學生：${student.c} (${student.n}) ${student.name}`;
                initGame();
            } else {
                const err = document.getElementById('login-error');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        });

        function initGame() {
            const select = document.getElementById('article-select');
            select.innerHTML = "";
            articleDatabase.forEach((cat, ci) => {
                const g = document.createElement('optgroup');
                g.label = cat.category;
                cat.items.forEach((it, ii) => {
                    const o = document.createElement('option');
                    o.value = `${ci}-${ii}`; o.textContent = it.title;
                    g.appendChild(o);
                });
                select.appendChild(g);
            });
            select.onchange = updateArticle;
            updateArticle();
        }

        function updateArticle() {
            if (isPlaying) return;
            const [ci, ii] = document.getElementById('article-select').value.split('-').map(Number);
            const article = articleDatabase[ci].items[ii];
            currentText = article.content;
            currentCategoryName = articleDatabase[ci].category;
            currentArticleTitle = article.title;
            
            document.getElementById('category-display').textContent = currentCategoryName;
            document.getElementById('text-container').innerHTML = currentText.split('').map(c => `<span>${c}</span>`).join('');
            document.getElementById('stats-total').innerText = currentText.length;
        }

        function startGame() {
            isPlaying = true;
            document.getElementById('article-select').disabled = true;
            const inputBox = document.getElementById('input-box');
            inputBox.disabled = false;
            inputBox.value = "";
            inputBox.focus();
            startTime = Date.now();
            timer = setInterval(updateStats, 500);
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');
        }

        function updateStats() {
            const typed = document.getElementById('input-box').value;
            const spans = document.getElementById('text-container').querySelectorAll('span');
            let correct = 0;
            spans.forEach((s, i) => {
                const char = typed[i];
                if (char == null) s.className = "";
                else if (char === s.innerText) { s.className = "char-correct"; correct++; }
                else s.className = "char-incorrect";
                if (i === typed.length) s.classList.add('char-current');
            });
            const acc = typed.length > 0 ? Math.round((correct / typed.length) * 100) : 0;
            const sec = Math.floor((Date.now() - startTime) / 1000);
            const cpm = sec > 0 ? Math.round((correct / sec) * 60) : 0;
            document.getElementById('stats-correct').innerText = correct;
            document.getElementById('stats-accuracy').innerText = acc + "%";
            document.getElementById('stats-time').innerText = sec + "s";
            document.getElementById('stats-wpm').innerText = cpm;
            return { correct, acc, sec, cpm };
        }

        function stopGame() {
            clearInterval(timer);
            isPlaying = false;
            document.getElementById('input-box').disabled = true;
            const s = updateStats();
            document.getElementById('result-user-info').innerHTML = `
                <div class="font-bold text-indigo-700">學生：${currentUser.c} (${currentUser.n}) ${currentUser.name}</div>
				<div class="text-xs text-gray-500 mt-1">練習項目：${currentCategoryName} - ${currentArticleTitle}</div>
            `;
            document.getElementById('result-content').innerHTML = `
                <div class="flex justify-between"><span>耗時：</span><span class="font-bold">${s.sec} 秒</span></div>
                <div class="flex justify-between"><span>正確字數：</span><span class="font-bold text-green-600">${s.correct} / ${currentText.length}</span></div>
                <div class="flex justify-between"><span>準確度：</span><span class="font-bold text-orange-600">${s.acc}%</span></div>
                <div class="flex justify-between"><span>打字速率：</span><span class="font-bold text-purple-600">${s.cpm} CPM</span></div>
            `;
            document.getElementById('result-overlay').classList.remove('hidden');
        }


        function resetGame() {
            document.getElementById('result-overlay').classList.add('hidden');
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-stop').classList.add('hidden');
            document.getElementById('article-select').disabled = false;
            updateArticle();
        }

        document.getElementById('btn-screenshot').addEventListener('click', () => {
            const area = document.getElementById('screenshot-area');
            const btns = area.querySelectorAll('button');
            btns.forEach(b => b.style.display = 'none');
            html2canvas(area, { scale: 2 }).then(canvas => {
                btns.forEach(b => b.style.display = 'block');
                const a = document.createElement('a');
                a.download = `成績單_${currentUser.c}_${currentUser.name}.png`;
                a.href = canvas.toDataURL();
                a.click();
            });
        });

        document.getElementById('btn-start').onclick = startGame;
        document.getElementById('btn-stop').onclick = stopGame;
        document.getElementById('input-box').oninput = updateStats;
    </script>
